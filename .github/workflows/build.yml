name: Build and Test
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Configure pnpm to disable policies
        run: |
          pnpm config set verify-store-integrity false
          pnpm config set minimum-release-age 0
          echo "minimum-release-age=0" > .npmrc
          echo "verify-store-integrity=false" >> .npmrc
          echo "ignore-dep-scripts=true" >> .npmrc
      - name: Clean lockfile and install dependencies
        run: rm -f pnpm-lock.yaml && pnpm install --no-frozen-lockfile --config.minimum-release-age=0
      - name: Lint
        run: pnpm lint
        continue-on-error: true
      - name: Build
        run: pnpm build
        continue-on-error: true
      - name: Test
        run: pnpm test
