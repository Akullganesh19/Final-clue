name: Build and Test
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22.x
      - run: npm install -g pnpm
      - run: pnpm install
      - run: pnpm lint
        continue-on-error: true
      - run: pnpm build
        continue-on-error: true
      - run: pnpm test
